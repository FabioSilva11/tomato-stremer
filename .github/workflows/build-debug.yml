name: Build Debug APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Generate localizations
        run: flutter gen-l10n
      
      - name: Run tests
        run: flutter test --coverage
        continue-on-error: true
      
      - name: Analyze code
        run: flutter analyze
        continue-on-error: true
      
      - name: Build Debug APK
        run: flutter build apk --debug
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tomato-streaming-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
      
      - name: Comment PR with APK link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 📱 Build Debug APK
            
            ✅ Build concluído com sucesso!
            
            O APK de debug está disponível nos artifacts desta execução.
            
            **Download:** [Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.head_ref }}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
