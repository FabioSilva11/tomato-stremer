name: Build and Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.2'
          cache: true

      - name: Verify Flutter
        run: |
          flutter --version
          dart --version

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Analyze project
        run: flutter analyze
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
          build/app/outputs/flutter-apk/tomato-streaming-v${{ steps.version.outputs.version }}.apk

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Tomato Streaming ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## 🍅 Tomato Streaming ${{ github.ref_name }}

            APK de lançamento da versão ${{ steps.version.outputs.version }}.

            ### Informações

            - Versão: ${{ steps.version.outputs.version }}
            - Build: ${{ github.run_number }}
            - Commit: ${{ github.sha }}

      - name: Upload APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/tomato-streaming-v${{ steps.version.outputs.version }}.apk
          asset_name: tomato-streaming-v${{ steps.version.outputs.version }}.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-${{ steps.version.outputs.version }}
          path: build/debug-info/
          retention-days: 90