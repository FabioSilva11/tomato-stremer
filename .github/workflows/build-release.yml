name: Build and Release APK

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger em tags como v1.0.0, v1.0.1, etc.
  workflow_dispatch:  # Permite execução manual

jobs:
  build:
    name: Build APK Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Generate localizations
        run: flutter gen-l10n
      
      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info
      
      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/tomato-streaming-v${{ steps.version.outputs.version }}.apk
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Tomato Streaming ${{ github.ref_name }}
          body: |
            ## 🍅 Tomato Streaming ${{ github.ref_name }}
            
            ### 📱 Download
            Baixe o APK abaixo e instale no seu dispositivo Android.
            
            ### ✨ Novidades nesta versão
            - Sistema de anúncios com redundância (AdMob + Unity Ads)
            - Criptografia AES-256 e ofuscação ProGuard
            - Notificações de novos episódios
            - Player com botões de ±10 segundos
            - Suporte a Português e Inglês
            - Banners discretos
            
            ### 📊 Informações Técnicas
            - Versão: ${{ steps.version.outputs.version }}
            - Build: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Data: ${{ github.event.head_commit.timestamp }}
            
            ### 🔒 Segurança
            - ✅ Código ofuscado com ProGuard + R8
            - ✅ Criptografia AES-256
            - ✅ Token de API protegido
            - ✅ Armazenamento seguro (KeyStore)
            
            ### 📋 Requisitos
            - Android 5.0+ (API 21+)
            - Conexão com internet
            - ~30 MB de espaço
            
            ### 🆘 Suporte
            Se encontrar problemas, abra uma issue neste repositório.
          draft: false
          prerelease: false
      
      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/tomato-streaming-v${{ steps.version.outputs.version }}.apk
          asset_name: tomato-streaming-v${{ steps.version.outputs.version }}.apk
          asset_content_type: application/vnd.android.package-archive
      
      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-${{ steps.version.outputs.version }}
          path: build/debug-info/
          retention-days: 90
